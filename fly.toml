# fly.toml app configuration file generated for svelte-storyblok on 2026-06-01T17:14:19+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'svelte-storyblok'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true

[[services]]
  protocol = 'tcp'
  internal_port = 3000
  ports = []
  processes = ['app']

  [services.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 850

[checks]
  [checks.alive]
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'
    method = 'get'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
